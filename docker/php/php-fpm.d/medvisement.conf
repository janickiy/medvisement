[medvisement]
user = medvisement
group = medvisement

clear_env = no

listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 6
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4

pm.max_requests = 500

request_terminate_timeout = 120s

php_admin_value[memory_limit] = 512M

access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no
